<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robo 🤖</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #00e5ff;
    }

    canvas {
      background-color: #1a1a2e;
      border-radius: 20px;
      border: 3px solid #00e5ff;
    }

    .chat-box {
      margin-top: 30px;
      display: flex;
      gap: 10px;
    }

    input {
      padding: 12px 20px;
      width: 300px;
      border-radius: 30px;
      border: 2px solid #00e5ff;
      background: #1a1a2e;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    button {
      padding: 12px 24px;
      border-radius: 30px;
      border: none;
      background: #00e5ff;
      color: #0f0f1a;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00b8d4;
    }

    #response {
      margin-top: 20px;
      max-width: 400px;
      text-align: center;
      font-size: 1rem;
      color: #b0bec5;
      min-height: 40px;
      padding: 0 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <h1>Hey, I'm Robo 🤖</h1>

  <canvas id="faceCanvas" width="200" height="200"></canvas>

  <div class="chat-box">
    <input type="text" id="userInput" placeholder="Ask me anything..." />
    <button onclick="askRobo()">Ask</button>
  </div>

  <p id="response">I'm ready! Ask me something 😊</p>

  <script src="config.js"></script>
  <script>
    const canvas = document.getElementById('faceCanvas');
    const ctx = canvas.getContext('2d');

    function drawFace(mood) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Eyes
      ctx.fillStyle = '#00e5ff';
      ctx.beginPath();
      ctx.ellipse(70, 80, 20, 25, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(130, 80, 20, 25, 0, 0, Math.PI * 2);
      ctx.fill();

      // Pupils
      ctx.fillStyle = '#0f0f1a';
      ctx.beginPath();
      ctx.ellipse(70, 82, 8, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(130, 82, 8, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // Mouth
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 4;
      ctx.beginPath();

      if (mood === 'happy') {
        ctx.arc(100, 140, 30, 0, Math.PI);
      } else if (mood === 'thinking') {
        ctx.moveTo(70, 150);
        ctx.lineTo(130, 150);
      } else if (mood === 'surprised') {
        ctx.ellipse(100, 150, 15, 20, 0, 0, Math.PI * 2);
      } else {
        ctx.arc(100, 135, 25, 0.1, Math.PI - 0.1);
      }

      ctx.stroke();
    }

    drawFace('neutral');

    async function askRobo() {
      const input = document.getElementById('userInput').value;
      if (!input) return;

      drawFace('thinking');
      document.getElementById('response').innerText = 'Hmm, let me think... 🤔';

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            max_tokens: 200,
            messages: [
              { 
                role: 'system', 
                content: 'You are Robo, a friendly and cute desktop companion robot. You give short, cheerful answers in 2-3 sentences maximum. You are helpful, fun, and kid-friendly.' 
              },
              { 
                role: 'user', 
                content: input 
              }
            ]
          })
        });

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error.message);
        }

        const answer = data.choices[0].message.content;
        drawFace('happy');
        document.getElementById('response').innerText = answer;

      } catch (error) {
        drawFace('surprised');
        document.getElementById('response').innerText = 'Oops! Something went wrong 😅 ' + error.message;
        console.error(error);
      }

      document.getElementById('userInput').value = '';
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') askRobo();
    });
  </script>

</body>
</html>
